# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Home
email: danilevskyd@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Write an awesome description for your new site here. You can edit this
  line in _config.yml. It will appear in your document head meta (for
  Google search results) and in your feed.xml site description.
twitter_username: danilevskydv
github_username: danilevsky
minimal_mistakes_skin: dark
search: true
my_username: &my_username "Denis Danilevskiy"

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
urls_linkedid: &urls_linkedid "https://www.linkedin.com/in/danilevskiyd/"
urls_upwork: &urls_upwork "https://www.upwork.com/freelancers/danilevsky/"
urls_github: &urls_github "https://github.com/danilevsky/"
urls_telegram: &urls_telegram "https://t.me/xonagdev"
include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : *my_username
  avatar : "/assets/images/avatar-photo.jpg"
  bio    : "I am a C++ desktop engineer who loves exploring the inner workings of Windows and multimedia systems. I enjoy sharing what I learn with others along the way."
  links:
    - label: "LinkedId"
      icon: "fab fa-fw fa-linkedin"
      url: *urls_linkedid
    - label: "Upwork"
      icon: "fas fa-fw fa-link"
      url: *urls_upwork
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: *urls_github
    - label: "Telegram"
      icon: "fab fa-fw fa-telegram"
      url: *urls_telegram

footer:
  links:
    - label: "LinkedId"
      icon: "fab fa-fw fa-linkedin"
      url: *urls_linkedid
    - label: "Upwork"
      icon: "fas fa-fw fa-link"
      url: *urls_upwork
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: *urls_github
    - label: "Telegram"
      icon: "fab fa-fw fa-telegram"
      url: *urls_telegram

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/